apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soc-analyzer
  template:
    metadata:
      labels:
        app: soc-analyzer
    spec:
      containers:
      - name: analyzer
        image: soc-analyzer:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        env:
        - name: REDIS_URL
          value: "redis://message-broker:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: analyzer
spec:
  ports:
  - port: 4000
    targetPort: 4000
  selector:
    app: soc-analyzer
