apiVersion: apps/v1
kind: Deployment
metadata:
  name: soc-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soc-ui
  template:
    metadata:
      labels:
        app: soc-ui
    spec:
      containers:
      - name: ui
        image: soc-ui:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: soc-ui
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 32000
  selector:
    app: soc-ui
